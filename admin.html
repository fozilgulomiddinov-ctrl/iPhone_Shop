<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - iStore Uzbekistan</title>
  <script src="./admin.js" defer></script>
  <link rel="stylesheet" href="./output.css" />
</head>
<body>
  <div id="container" class="bg-[#f5f5f7] min-h-screen">

    <!-- Header -->
    <header class="header">
      <nav class="fixed top-0 left-0 w-full bg-[#fcfcfd]/70 backdrop-blur-lg shadow z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
          <h1 class="text-2xl font-bold">
            <img src="./img/apple-logo.png" alt="iStore" class="h-6" />
          </h1>
          
          <div class="flex gap-8 text-sm font-medium">
            <a href="#" class="hover:text-blue-600 transition">Store</a>
            <a href="#" class="hover:text-blue-600 transition">Mac</a>
            <a href="#" class="hover:text-blue-600 transition">iPad</a>
            <a href="#" class="hover:text-blue-600 transition">iPhone</a>
            <a href="#" class="hover:text-blue-600 transition">Watch</a>
            <a href="#" class="hover:text-blue-600 transition">Support</a>
          </div>

          <div class="flex items-center gap-6">
            <button id="themeBtn" class="cursor-pointer p-2 hover:bg-gray-100 rounded-xl transition">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12.2 22c4.53 0 8.45-2.91 9.76-7.24a1.002 1.002 0 0 0-1.25-1.25c-.78.23-1.58.35-2.38.35-4.52 0-8.2-3.68-8.2-8.2 0-.8.12-1.6.35-2.38.11-.35.01-.74-.25-1s-.64-.36-1-.25A10.17 10.17 0 0 0 2 11.8C2 17.42 6.57 22 12.2 22M8.18 4.65c-.03.34-.05.68-.05 1.02 0 5.62 4.57 10.2 10.2 10.2.34 0 .68-.02 1.02-.05C17.93 18.38 15.23 20 12.2 20 7.68 20 4 16.32 4 11.8a8.15 8.15 0 0 1 4.18-7.15"></path>
              </svg>
            </button>
            <a href="./index.html">
                <button class=" cursor-pointer px-6 py-2 bg-black text-white text-sm font-medium rounded-2xl hover:bg-gray-900 transition">
              Bosh Sahifa
            </button>
            </a>
          </div>
        </div>
      </nav>
    </header>

    <!-- Asosiy kontent -->
    <div class="flex gap-8 justify-center pt-24 pb-12 px-6 max-w-[1200px] mx-auto">

      <!-- Mahsulot Qo'shish Formasi -->
      <div id="box1" class="w-[380px] bg-white shadow-xl rounded-3xl p-8">
        <h1 class="text-3xl font-semibold mb-8">Mahsulot Qo'shish</h1>

        <!-- Nomi -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Mahsulot nomi</label>
          <input 
            id="name" 
            type="text" 
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition"
            placeholder="iPhone 15 Pro"
          />
        </div>

        <!-- Narxi -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Narxi</label>
          <div class="flex items-center bg-white border border-gray-300 rounded-2xl overflow-hidden focus-within:border-blue-500 transition">
            <div class="px-4 text-gray-500">$</div>
            <input 
              id="price" 
              type="number" 
              placeholder="0.00" 
              class="flex-1 py-3 outline-none text-base"
            />
            <select id="currency" class="bg-transparent px-4 py-3 text-gray-500 outline-none border-l">
              <option>USD</option>
              <option>CAD</option>
              <option>EUR</option>
            </select>
          </div>
        </div>

        <!-- Rasm URL -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Rasm URL</label>
          <input 
            id="link" 
            type="url" 
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition"
            placeholder="https://example.com/image.jpg"
          />
        </div>

        <!-- Kategoriya -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-2">Kategoriya</label>
          <select 
            id="category"
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition"
          >
            <option value="iphone">iPhone</option>
            <option value="watch">Watch</option>
            <option value="mac">Mac</option>
            <option value="airpods">AirPods</option>
          </select>
        </div>

        <!-- Qo'shish tugmasi -->
        <button 
          id="addBtn"
          class="w-full h-12 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl transition text-base"
        >
          Ro'yxatga Qo'shish
        </button>
      </div>

      <!-- Mavjud Mahsulotlar Jadvali -->
      <div id="box2" class="flex-1 max-w-[720px] bg-white shadow-xl rounded-3xl overflow-hidden flex flex-col">
        <h1 class="text-3xl font-semibold px-10 pt-8 pb-6 border-b">Mavjud Mahsulotlar</h1>
        
        <table id="table" class="w-full flex-1">
          <thead>
            <tr class="bg-gray-50 border-b">
              <th class="text-left px-10 py-5 text-sm font-medium text-gray-600">Mahsulot</th>
              <th class="text-left px-6 py-5 text-sm font-medium text-gray-600">Narxi</th>
              <th class="text-center px-6 py-5 text-sm font-medium text-gray-600">Amal</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y text-sm">
            <!-- JavaScript orqali qatorlar qo'shiladi -->
          </tbody>
        </table>
      </div>

    </div>

    <!-- Footer -->
    <footer class="bg-white py-10 border-t mt-auto">
      <div class="max-w-6xl mx-auto text-center text-gray-400 text-sm">
        <p>Copyright © 2026 iStore Uzbekistan. Barcha huquqlar himoyalangan.</p>
        <p class="mt-2">O'zbekiston | Maxfiylik siyosati | Sayt xaritasi</p>
      </div>
    </footer>

  </div>
</body>
</html>
